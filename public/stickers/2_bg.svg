<svg xmlns="http://www.w3.org/2000/svg" width="512" height="512" viewBox="0 0 512 512">
  <defs>
    <radialGradient id="warm" cx="50%" cy="40%" r="60%">
      <stop offset="0%" stop-color="#FFF3E0"/>
      <stop offset="100%" stop-color="#D4A06A"/>
    </radialGradient>
    <radialGradient id="steam" cx="50%" cy="100%" r="80%">
      <stop offset="0%" stop-color="#ffffff88"/>
      <stop offset="100%" stop-color="#ffffff00"/>
    </radialGradient>
    <linearGradient id="table" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#8B6914"/>
      <stop offset="100%" stop-color="#6B4F12"/>
    </linearGradient>
    <linearGradient id="pot" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#E8E8E8"/>
      <stop offset="100%" stop-color="#AAAAAA"/>
    </linearGradient>
    <radialGradient id="broth" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#F5DEB3"/>
      <stop offset="60%" stop-color="#DAA520"/>
      <stop offset="100%" stop-color="#B8860B"/>
    </radialGradient>
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="130%">
      <feDropShadow dx="2" dy="4" stdDeviation="6" flood-color="#00000044"/>
    </filter>
  </defs>
  <ellipse cx="256" cy="256" rx="245" ry="245" fill="white" filter="url(#shadow)"/>
  <ellipse cx="256" cy="256" rx="235" ry="235" fill="url(#warm)"/>
  <!-- Warm restaurant ambient -->
  <rect x="30" y="30" width="452" height="200" rx="10" fill="#8B4513" opacity="0.15"/>
  <!-- Lanterns -->
  <g opacity="0.8">
    <ellipse cx="130" cy="80" rx="25" ry="35" fill="#E74C3C"/>
    <rect x="125" y="45" width="10" height="10" rx="2" fill="#C0392B"/>
    <line x1="130" y1="45" x2="130" y2="30" stroke="#8B4513" stroke-width="2"/>
    <text x="130" y="88" text-anchor="middle" font-size="16" fill="#FFD700">福</text>
    <ellipse cx="382" cy="80" rx="25" ry="35" fill="#E74C3C"/>
    <rect x="377" y="45" width="10" height="10" rx="2" fill="#C0392B"/>
    <line x1="382" y1="45" x2="382" y2="30" stroke="#8B4513" stroke-width="2"/>
    <text x="382" y="88" text-anchor="middle" font-size="16" fill="#FFD700">福</text>
  </g>
  <!-- Table -->
  <ellipse cx="256" cy="350" rx="200" ry="50" fill="url(#table)"/>
  <ellipse cx="256" cy="345" rx="190" ry="42" fill="#A0784C"/>
  <!-- Hot pot -->
  <ellipse cx="256" cy="280" rx="100" ry="40" fill="url(#pot)" stroke="#999" stroke-width="2"/>
  <ellipse cx="256" cy="275" rx="90" ry="34" fill="url(#broth)"/>
  <!-- Pot handles -->
  <ellipse cx="150" cy="278" rx="15" ry="8" fill="#CCC" stroke="#999" stroke-width="1.5"/>
  <ellipse cx="362" cy="278" rx="15" ry="8" fill="#CCC" stroke="#999" stroke-width="1.5"/>
  <!-- Food in pot -->
  <ellipse cx="230" cy="268" rx="18" ry="8" fill="#90EE90" opacity="0.8"/>
  <ellipse cx="270" cy="272" rx="15" ry="7" fill="#FFB6C1" opacity="0.8"/>
  <ellipse cx="250" cy="260" rx="12" ry="6" fill="#F5F5DC" opacity="0.8"/>
  <circle cx="285" cy="264" r="6" fill="#8B4513" opacity="0.5"/>
  <!-- Steam -->
  <g opacity="0.4">
    <path d="M230 240 Q225 210 235 180" fill="none" stroke="white" stroke-width="3" stroke-linecap="round"/>
    <path d="M256 235 Q260 200 250 170" fill="none" stroke="white" stroke-width="3" stroke-linecap="round"/>
    <path d="M280 238 Q285 208 275 178" fill="none" stroke="white" stroke-width="3" stroke-linecap="round"/>
  </g>
  <!-- Side dishes -->
  <ellipse cx="110" cy="330" rx="35" ry="15" fill="#DDD" stroke="#BBB" stroke-width="1"/>
  <ellipse cx="115" cy="326" rx="10" ry="5" fill="#FFB6C1"/>
  <ellipse cx="100" cy="328" rx="8" ry="4" fill="#FFB6C1"/>
  <ellipse cx="400" cy="330" rx="35" ry="15" fill="#DDD" stroke="#BBB" stroke-width="1"/>
  <circle cx="395" cy="327" r="5" fill="#2E8B57"/>
  <circle cx="408" cy="326" r="4" fill="#2E8B57"/>
  <!-- Chopsticks -->
  <line x1="340" y1="300" x2="390" y2="250" stroke="#8B6914" stroke-width="3" stroke-linecap="round"/>
  <line x1="345" y1="305" x2="395" y2="255" stroke="#A0784C" stroke-width="3" stroke-linecap="round"/>
</svg>
