<svg xmlns="http://www.w3.org/2000/svg" width="512" height="512" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="shell" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#6B8E23"/>
      <stop offset="50%" stop-color="#556B2F"/>
      <stop offset="100%" stop-color="#3B5323"/>
    </linearGradient>
    <linearGradient id="skin" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#8FBC8F"/>
      <stop offset="100%" stop-color="#5F8A5F"/>
    </linearGradient>
    <linearGradient id="belly" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#F5DEB3"/>
      <stop offset="100%" stop-color="#DEB887"/>
    </linearGradient>
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="130%">
      <feDropShadow dx="2" dy="4" stdDeviation="6" flood-color="#00000044"/>
    </filter>
  </defs>
  <g filter="url(#shadow)" transform="translate(256, 230)">
    <!-- Back flippers -->
    <ellipse cx="65" cy="55" rx="30" ry="12" fill="url(#skin)" stroke="#4A7A4A" stroke-width="1" transform="rotate(30, 65, 55)"/>
    <ellipse cx="-65" cy="55" rx="30" ry="12" fill="url(#skin)" stroke="#4A7A4A" stroke-width="1" transform="rotate(-30, -65, 55)"/>
    <!-- Shell (main body) -->
    <ellipse cx="0" cy="0" rx="110" ry="75" fill="url(#shell)" stroke="#3B5323" stroke-width="2"/>
    <!-- Shell pattern - hexagonal -->
    <path d="M0 -50 L30 -35 L30 -5 L0 10 L-30 -5 L-30 -35 Z" fill="none" stroke="#4A6B2A" stroke-width="1.5"/>
    <path d="M0 10 L30 25 L30 50 L0 65 L-30 50 L-30 25 Z" fill="none" stroke="#4A6B2A" stroke-width="1.5"/>
    <path d="M30 -35 L60 -25 L60 5 L30 15 L30 -5" fill="none" stroke="#4A6B2A" stroke-width="1.5"/>
    <path d="M-30 -35 L-60 -25 L-60 5 L-30 15 L-30 -5" fill="none" stroke="#4A6B2A" stroke-width="1.5"/>
    <path d="M30 25 L60 15 L65 40 L40 55" fill="none" stroke="#4A6B2A" stroke-width="1.5"/>
    <path d="M-30 25 L-60 15 L-65 40 L-40 55" fill="none" stroke="#4A6B2A" stroke-width="1.5"/>
    <!-- Shell highlight -->
    <ellipse cx="-20" cy="-20" rx="40" ry="25" fill="#7BA83D" opacity="0.3"/>
    <!-- Shell edge / rim -->
    <ellipse cx="0" cy="5" rx="105" ry="70" fill="none" stroke="#6B8E23" stroke-width="1" opacity="0.5"/>
    <!-- Front flippers -->
    <g transform="translate(80, -10) rotate(20)">
      <ellipse cx="30" cy="0" rx="45" ry="15" fill="url(#skin)" stroke="#4A7A4A" stroke-width="1.5"/>
      <line x1="20" y1="-5" x2="60" y2="-2" stroke="#4A7A4A" stroke-width="0.5" opacity="0.5"/>
      <line x1="20" y1="0" x2="65" y2="3" stroke="#4A7A4A" stroke-width="0.5" opacity="0.5"/>
      <line x1="25" y1="5" x2="60" y2="8" stroke="#4A7A4A" stroke-width="0.5" opacity="0.5"/>
    </g>
    <g transform="translate(-80, -10) rotate(-20)">
      <ellipse cx="-30" cy="0" rx="45" ry="15" fill="url(#skin)" stroke="#4A7A4A" stroke-width="1.5"/>
      <line x1="-20" y1="-5" x2="-60" y2="-2" stroke="#4A7A4A" stroke-width="0.5" opacity="0.5"/>
      <line x1="-20" y1="0" x2="-65" y2="3" stroke="#4A7A4A" stroke-width="0.5" opacity="0.5"/>
      <line x1="-25" y1="5" x2="-60" y2="8" stroke="#4A7A4A" stroke-width="0.5" opacity="0.5"/>
    </g>
    <!-- Head -->
    <ellipse cx="0" cy="-65" rx="30" ry="25" fill="url(#skin)" stroke="#4A7A4A" stroke-width="1.5"/>
    <!-- Head pattern -->
    <path d="M-10 -75 Q0 -82 10 -75" fill="none" stroke="#4A7A4A" stroke-width="0.8" opacity="0.5"/>
    <path d="M-15 -68 Q0 -73 15 -68" fill="none" stroke="#4A7A4A" stroke-width="0.8" opacity="0.5"/>
    <!-- Eyes -->
    <circle cx="-12" cy="-70" r="5" fill="#2C3E50"/>
    <circle cx="12" cy="-70" r="5" fill="#2C3E50"/>
    <circle cx="-10" cy="-72" r="2" fill="white"/>
    <circle cx="14" cy="-72" r="2" fill="white"/>
    <!-- Mouth (smile) -->
    <path d="M-8 -58 Q0 -52 8 -58" fill="none" stroke="#3B5323" stroke-width="1.5" stroke-linecap="round"/>
    <!-- Tail -->
    <path d="M0 70 Q5 85 0 95 Q-3 85 0 70" fill="url(#skin)" stroke="#4A7A4A" stroke-width="1"/>
  </g>
</svg>
