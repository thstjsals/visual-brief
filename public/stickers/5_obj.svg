<svg xmlns="http://www.w3.org/2000/svg" width="512" height="512" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="plate" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#2C2C2C"/>
      <stop offset="100%" stop-color="#1A1A1A"/>
    </linearGradient>
    <radialGradient id="sear" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#8B4513"/>
      <stop offset="40%" stop-color="#6B3410"/>
      <stop offset="100%" stop-color="#4A2508"/>
    </radialGradient>
    <linearGradient id="steak" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#8B3A3A"/>
      <stop offset="30%" stop-color="#6B2020"/>
      <stop offset="100%" stop-color="#4A1515"/>
    </linearGradient>
    <radialGradient id="hotsurface" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#FF440015"/>
      <stop offset="100%" stop-color="#FF440000"/>
    </radialGradient>
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="130%">
      <feDropShadow dx="2" dy="4" stdDeviation="6" flood-color="#00000044"/>
    </filter>
  </defs>
  <g filter="url(#shadow)" transform="translate(256, 240)">
    <!-- Hot iron plate -->
    <ellipse cx="0" cy="20" rx="150" ry="55" fill="url(#plate)" stroke="#444" stroke-width="2"/>
    <ellipse cx="0" cy="15" rx="140" ry="48" fill="#333"/>
    <!-- Heat glow -->
    <ellipse cx="0" cy="15" rx="130" ry="42" fill="url(#hotsurface)"/>
    <!-- Grill lines -->
    <line x1="-110" y1="0" x2="110" y2="0" stroke="#3A3A3A" stroke-width="2"/>
    <line x1="-115" y1="15" x2="115" y2="15" stroke="#3A3A3A" stroke-width="2"/>
    <line x1="-110" y1="30" x2="110" y2="30" stroke="#3A3A3A" stroke-width="2"/>
    <line x1="-100" y1="45" x2="100" y2="45" stroke="#3A3A3A" stroke-width="2"/>
    <line x1="-105" y1="-15" x2="105" y2="-15" stroke="#3A3A3A" stroke-width="2"/>
    <!-- Steak -->
    <g transform="translate(-20, 0)">
      <path d="M-50 -15 Q-30 -35 20 -30 Q55 -25 60 -5 Q62 15 40 25 Q10 35 -30 30 Q-55 25 -55 5 Z" fill="url(#steak)" stroke="#3A1010" stroke-width="1.5"/>
      <!-- Sear marks -->
      <line x1="-35" y1="-10" x2="40" y2="-10" stroke="#2A0808" stroke-width="3" opacity="0.6"/>
      <line x1="-30" y1="5" x2="45" y2="5" stroke="#2A0808" stroke-width="3" opacity="0.6"/>
      <line x1="-25" y1="20" x2="35" y2="20" stroke="#2A0808" stroke-width="3" opacity="0.5"/>
      <!-- Fat marbling -->
      <path d="M-20 -20 Q-10 -15 0 -20" fill="none" stroke="#A06060" stroke-width="1" opacity="0.5"/>
      <path d="M10 -5 Q25 0 35 -5" fill="none" stroke="#A06060" stroke-width="1" opacity="0.5"/>
      <path d="M-30 10 Q-15 15 0 10" fill="none" stroke="#A06060" stroke-width="1" opacity="0.5"/>
      <!-- Juicy highlight -->
      <ellipse cx="10" cy="0" rx="20" ry="10" fill="#8B2020" opacity="0.3"/>
    </g>
    <!-- Butter pat -->
    <g transform="translate(50, -15)">
      <rect x="-10" y="-8" width="20" height="16" rx="3" fill="#FFF8DC" stroke="#DAA520" stroke-width="0.5"/>
      <rect x="-8" y="-6" width="16" height="12" rx="2" fill="#FFEB3B" opacity="0.3"/>
    </g>
    <!-- Garlic chips -->
    <circle cx="55" cy="20" r="5" fill="#F5DEB3" stroke="#DAA520" stroke-width="0.5"/>
    <circle cx="65" cy="15" r="4" fill="#F5DEB3" stroke="#DAA520" stroke-width="0.5"/>
    <circle cx="60" cy="28" r="4" fill="#EED8AE" stroke="#DAA520" stroke-width="0.5"/>
    <!-- Garnish - broccoli -->
    <g transform="translate(-80, 15)">
      <rect x="-2" y="5" width="4" height="10" rx="1" fill="#228B22"/>
      <circle cx="0" cy="3" r="8" fill="#2E8B57"/>
      <circle cx="-5" cy="5" r="6" fill="#3CB371"/>
      <circle cx="5" cy="5" r="6" fill="#2E8B57"/>
      <circle cx="0" cy="0" r="5" fill="#3CB371"/>
    </g>
    <!-- Corn -->
    <g transform="translate(80, 30)">
      <ellipse cx="0" cy="0" rx="12" ry="8" fill="#FFD700" stroke="#DAA520" stroke-width="0.5"/>
      <line x1="-8" y1="-3" x2="-8" y2="3" stroke="#FFC107" stroke-width="2"/>
      <line x1="-3" y1="-5" x2="-3" y2="5" stroke="#FFC107" stroke-width="2"/>
      <line x1="3" y1="-5" x2="3" y2="5" stroke="#FFC107" stroke-width="2"/>
      <line x1="8" y1="-3" x2="8" y2="3" stroke="#FFC107" stroke-width="2"/>
    </g>
    <!-- Sizzle steam -->
    <g opacity="0.3">
      <path d="M-40 -35 Q-45 -55 -35 -75" fill="none" stroke="white" stroke-width="2" stroke-linecap="round"/>
      <path d="M0 -40 Q5 -60 -5 -80" fill="none" stroke="white" stroke-width="2" stroke-linecap="round"/>
      <path d="M30 -35 Q25 -55 35 -70" fill="none" stroke="white" stroke-width="2" stroke-linecap="round"/>
    </g>
    <!-- Plate handle -->
    <ellipse cx="-155" cy="20" rx="15" ry="8" fill="#2C2C2C" stroke="#444" stroke-width="1.5"/>
    <ellipse cx="155" cy="20" rx="15" ry="8" fill="#2C2C2C" stroke="#444" stroke-width="1.5"/>
  </g>
</svg>
