<svg xmlns="http://www.w3.org/2000/svg" width="512" height="512" viewBox="0 0 512 512">
  <defs>
    <radialGradient id="ocean" cx="50%" cy="30%" r="70%">
      <stop offset="0%" stop-color="#00BCD4"/>
      <stop offset="50%" stop-color="#0288D1"/>
      <stop offset="100%" stop-color="#01579B"/>
    </radialGradient>
    <radialGradient id="light" cx="50%" cy="0%" r="60%">
      <stop offset="0%" stop-color="#ffffff40"/>
      <stop offset="100%" stop-color="#ffffff00"/>
    </radialGradient>
    <linearGradient id="sand" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#C2B280"/>
      <stop offset="100%" stop-color="#A09060"/>
    </linearGradient>
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="130%">
      <feDropShadow dx="2" dy="4" stdDeviation="6" flood-color="#00000044"/>
    </filter>
  </defs>
  <ellipse cx="256" cy="256" rx="245" ry="245" fill="white" filter="url(#shadow)"/>
  <ellipse cx="256" cy="256" rx="235" ry="235" fill="url(#ocean)"/>
  <!-- Light rays from surface -->
  <g opacity="0.15">
    <polygon points="200,20 180,250 220,250" fill="white"/>
    <polygon points="280,20 260,250 300,250" fill="white"/>
    <polygon points="350,30 340,220 370,220" fill="white"/>
    <polygon points="140,40 125,200 155,200" fill="white"/>
  </g>
  <ellipse cx="256" cy="256" rx="235" ry="235" fill="url(#light)"/>
  <!-- Bubbles -->
  <g opacity="0.5">
    <circle cx="120" cy="150" r="8" fill="none" stroke="white" stroke-width="1.5"/>
    <circle cx="135" cy="180" r="5" fill="none" stroke="white" stroke-width="1"/>
    <circle cx="380" cy="200" r="10" fill="none" stroke="white" stroke-width="1.5"/>
    <circle cx="370" cy="170" r="4" fill="none" stroke="white" stroke-width="1"/>
    <circle cx="300" cy="120" r="6" fill="none" stroke="white" stroke-width="1"/>
  </g>
  <!-- Sea floor -->
  <path d="M30 400 Q80 370 130 390 Q180 410 230 385 Q280 365 330 390 Q380 415 430 385 Q460 370 490 395 L490 500 L30 500 Z" fill="url(#sand)"/>
  <!-- Coral -->
  <g transform="translate(100, 370)">
    <path d="M0 20 Q5 -10 10 -30 Q15 -40 12 -50" fill="none" stroke="#FF6B6B" stroke-width="5" stroke-linecap="round"/>
    <path d="M0 20 Q-5 -5 -8 -25 Q-12 -38 -8 -45" fill="none" stroke="#FF6B6B" stroke-width="5" stroke-linecap="round"/>
    <path d="M0 20 Q12 0 20 -15 Q25 -25 22 -35" fill="none" stroke="#FF8A8A" stroke-width="4" stroke-linecap="round"/>
    <circle cx="12" cy="-52" r="4" fill="#FF6B6B"/>
    <circle cx="-8" cy="-47" r="4" fill="#FF6B6B"/>
    <circle cx="22" cy="-37" r="3" fill="#FF8A8A"/>
  </g>
  <!-- Coral 2 -->
  <g transform="translate(350, 380)">
    <path d="M0 15 Q-3 -10 0 -30 Q2 -40 -2 -45" fill="none" stroke="#FFB347" stroke-width="5" stroke-linecap="round"/>
    <path d="M0 15 Q8 -5 15 -20 Q18 -30 15 -38" fill="none" stroke="#FFB347" stroke-width="4" stroke-linecap="round"/>
    <path d="M0 15 Q-10 0 -18 -15 Q-20 -22 -15 -30" fill="none" stroke="#FFCC66" stroke-width="4" stroke-linecap="round"/>
    <circle cx="-2" cy="-47" r="3" fill="#FFB347"/>
    <circle cx="15" cy="-40" r="3" fill="#FFB347"/>
    <circle cx="-15" cy="-32" r="3" fill="#FFCC66"/>
  </g>
  <!-- Seaweed -->
  <g transform="translate(230, 400)" opacity="0.7">
    <path d="M0 0 Q-10 -30 -5 -60 Q0 -80 -8 -100" fill="none" stroke="#2E8B57" stroke-width="4" stroke-linecap="round"/>
    <path d="M8 0 Q15 -25 10 -55 Q8 -75 15 -90" fill="none" stroke="#3CB371" stroke-width="3" stroke-linecap="round"/>
  </g>
  <!-- Small fish -->
  <g transform="translate(180, 200)" opacity="0.8">
    <ellipse cx="0" cy="0" rx="18" ry="8" fill="#FFD700"/>
    <polygon points="18,-6 28,0 18,6" fill="#FFC107"/>
    <circle cx="-10" cy="-2" r="2.5" fill="#333"/>
  </g>
  <g transform="translate(320, 260)" opacity="0.7">
    <ellipse cx="0" cy="0" rx="14" ry="6" fill="#87CEEB"/>
    <polygon points="14,-5 22,0 14,5" fill="#5DADE2"/>
    <circle cx="-8" cy="-1" r="2" fill="#333"/>
  </g>
  <g transform="translate(150, 300)" opacity="0.6">
    <ellipse cx="0" cy="0" rx="12" ry="5" fill="#FF9800"/>
    <polygon points="12,-4 18,0 12,4" fill="#F57C00"/>
    <circle cx="-6" cy="-1" r="1.5" fill="#333"/>
  </g>
</svg>
