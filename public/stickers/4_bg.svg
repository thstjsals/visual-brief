<svg xmlns="http://www.w3.org/2000/svg" width="512" height="512" viewBox="0 0 512 512">
  <defs>
    <radialGradient id="ambience" cx="50%" cy="40%" r="60%">
      <stop offset="0%" stop-color="#4A3728"/>
      <stop offset="100%" stop-color="#2C1E12"/>
    </radialGradient>
    <radialGradient id="lampglow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#FFD70066"/>
      <stop offset="100%" stop-color="#FFD70000"/>
    </radialGradient>
    <linearGradient id="counter" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#D4A06A"/>
      <stop offset="100%" stop-color="#8B6914"/>
    </linearGradient>
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="130%">
      <feDropShadow dx="2" dy="4" stdDeviation="6" flood-color="#00000044"/>
    </filter>
    <filter id="glow">
      <feGaussianBlur stdDeviation="8"/>
    </filter>
  </defs>
  <ellipse cx="256" cy="256" rx="245" ry="245" fill="white" filter="url(#shadow)"/>
  <ellipse cx="256" cy="256" rx="235" ry="235" fill="url(#ambience)"/>
  <!-- Warm light glows -->
  <circle cx="160" cy="100" r="60" fill="url(#lampglow)" filter="url(#glow)"/>
  <circle cx="350" cy="100" r="60" fill="url(#lampglow)" filter="url(#glow)"/>
  <!-- Ceiling -->
  <rect x="40" y="40" width="432" height="30" rx="3" fill="#1A120A"/>
  <!-- Pendant lamps -->
  <g>
    <line x1="160" y1="70" x2="160" y2="100" stroke="#555" stroke-width="1.5"/>
    <path d="M140 100 Q150 85 160 82 Q170 85 180 100" fill="#FFD700" opacity="0.8"/>
    <ellipse cx="160" cy="100" rx="20" ry="8" fill="#F5DEB3" opacity="0.9"/>
    <line x1="350" y1="70" x2="350" y2="100" stroke="#555" stroke-width="1.5"/>
    <path d="M330 100 Q340 85 350 82 Q360 85 370 100" fill="#FFD700" opacity="0.8"/>
    <ellipse cx="350" cy="100" rx="20" ry="8" fill="#F5DEB3" opacity="0.9"/>
  </g>
  <!-- Back wall shelves with bottles -->
  <rect x="80" y="100" width="350" height="120" rx="5" fill="#3A2818" stroke="#4A3828" stroke-width="1"/>
  <line x1="80" y1="150" x2="430" y2="150" stroke="#5A4838" stroke-width="1.5"/>
  <line x1="80" y1="190" x2="430" y2="190" stroke="#5A4838" stroke-width="1.5"/>
  <!-- Bottles on shelves -->
  <g opacity="0.8">
    <rect x="110" y="110" width="14" height="35" rx="3" fill="#2E8B57"/>
    <rect x="140" y="115" width="12" height="30" rx="3" fill="#8B4513"/>
    <rect x="170" y="108" width="14" height="37" rx="3" fill="#DAA520"/>
    <rect x="210" y="112" width="11" height="33" rx="3" fill="#C0392B"/>
    <rect x="250" y="110" width="13" height="35" rx="3" fill="#4682B4"/>
    <rect x="290" y="115" width="12" height="30" rx="3" fill="#9B59B6"/>
    <rect x="330" y="108" width="14" height="37" rx="3" fill="#2C3E50"/>
    <rect x="370" y="113" width="11" height="32" rx="3" fill="#D4A06A"/>
    <rect x="400" y="110" width="13" height="35" rx="3" fill="#E74C3C"/>
    <!-- Lower shelf -->
    <rect x="120" y="155" width="12" height="30" rx="3" fill="#DAA520"/>
    <rect x="155" y="158" width="14" height="27" rx="3" fill="#8B0000"/>
    <rect x="200" y="155" width="11" height="30" rx="3" fill="#556B2F"/>
    <rect x="240" y="157" width="13" height="28" rx="3" fill="#B8860B"/>
    <rect x="310" y="155" width="12" height="30" rx="3" fill="#CD853F"/>
    <rect x="350" y="158" width="14" height="27" rx="3" fill="#6B4423"/>
    <rect x="390" y="155" width="11" height="30" rx="3" fill="#C0392B"/>
  </g>
  <!-- Counter -->
  <path d="M40 300 L480 300 L460 320 L60 320 Z" fill="url(#counter)" stroke="#6B4F12" stroke-width="1.5"/>
  <ellipse cx="256" cy="300" rx="210" ry="8" fill="#B8924A" opacity="0.5"/>
  <!-- Plates on counter -->
  <ellipse cx="150" cy="290" rx="30" ry="10" fill="#FFF" stroke="#DDD" stroke-width="1" opacity="0.8"/>
  <ellipse cx="256" cy="288" rx="35" ry="12" fill="#FFF" stroke="#DDD" stroke-width="1" opacity="0.8"/>
  <ellipse cx="370" cy="290" rx="28" ry="10" fill="#FFF" stroke="#DDD" stroke-width="1" opacity="0.8"/>
  <!-- Sushi/sashimi hints on plates -->
  <rect x="140" y="282" width="20" height="8" rx="2" fill="#FA8072" opacity="0.8"/>
  <rect x="246" y="279" width="22" height="9" rx="2" fill="#FFA07A" opacity="0.8"/>
  <ellipse cx="370" cy="283" rx="10" ry="5" fill="#FFB6C1" opacity="0.8"/>
  <!-- Bar stools -->
  <g opacity="0.6">
    <rect x="130" y="340" width="40" height="10" rx="5" fill="#5A3A1A"/>
    <line x1="150" y1="350" x2="150" y2="400" stroke="#5A3A1A" stroke-width="3"/>
    <line x1="135" y1="400" x2="165" y2="400" stroke="#5A3A1A" stroke-width="2"/>
    <rect x="236" y="340" width="40" height="10" rx="5" fill="#5A3A1A"/>
    <line x1="256" y1="350" x2="256" y2="400" stroke="#5A3A1A" stroke-width="3"/>
    <line x1="241" y1="400" x2="271" y2="400" stroke="#5A3A1A" stroke-width="2"/>
    <rect x="345" y="340" width="40" height="10" rx="5" fill="#5A3A1A"/>
    <line x1="365" y1="350" x2="365" y2="400" stroke="#5A3A1A" stroke-width="3"/>
    <line x1="350" y1="400" x2="380" y2="400" stroke="#5A3A1A" stroke-width="2"/>
  </g>
</svg>
